    <script src="https://cdn.tailwindcss.com"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              sans: ['DM Sans', 'sans-serif'],
              serif: ['DM Serif Display', 'serif'],
            },
            colors: {
              sage: {
                50: '#f6f7f4',
                100: '#e8ebe3',
                200: '#d4d9cb',
                300: '#b5bea7',
                400: '#96a583',
                500: '#7a8c67',
                600: '#617150',
                700: '#4d5a41',

                900: '#363f30',

              warm: {
                50: '#fefdfb',
                100: '#fdf8f0',
                200: '#faf0de',
                300: '#f5e3c5',
                400: '#efd0a3',
                500: '#e6b87a',

                50: '#fdf5f3',

                200: '#fad4cb',
                300: '#f5b5a6',

                100: '#daeef5',
                200: '#b9deec',
                300: '#88c7de',

              },
            },
            animation: {
              'float': 'float 6s ease-in-out infinite',
              'float-delayed': 'float 6s ease-in-out 3s infinite',
            },
            keyframes: {
              float: {
                '0%, 100%': { transform: 'translateY(0px)' },
                '50%': { transform: 'translateY(-12px)' },
              }
            }
          }
        }
      }
    </script>
    <style>
      body {
        background-color: #fefdfb;
        color: #363f30;
      }

      ::-webkit-scrollbar { width: 6px; }
      ::-webkit-scrollbar-track { background: #f6f7f4; }
      ::-webkit-scrollbar-thumb { background: #d4d9cb; border-radius: 3px; }
      ::-webkit-scrollbar-thumb:hover { background: #b5bea7; }
      /* Smooth transitions */
      * { transition-timing-function: cubic-bezier(0.4, 0, 0.2, 1); }
